server:
  port: 8080

spring:
  datasource:
    # 添加 allowPublicKeyRetrieval=true 以兼容 MySQL 8 本地连接
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://127.0.0.1:3306/ai_emotion?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:1029384756Wh}
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  ai:
    openai:
      enabled: ${SPRING_AI_OPENAI_ENABLED:false}
      api-key: ${OPENROUTER_API_KEY:}
      base-url: ${OPENROUTER_BASE_URL:https://openrouter.ai/api}
      chat:
        options:
          model: ${OPENROUTER_MODEL:openrouter/free}

upload:
  base-dir: ${UPLOAD_BASE_DIR:${user.home}/ai-emotion/uploads}

app:
  upload:
    public-path: /uploads
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://127.0.0.1:5173,http://localhost:5173}
    allowed-origin-patterns: ${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://127.0.0.1:*,http://localhost:*}
    allow-credentials: ${APP_CORS_ALLOW_CREDENTIALS:true}
    allowed-methods: ${APP_CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,OPTIONS}
    allowed-headers: ${APP_CORS_ALLOWED_HEADERS:Authorization,Content-Type}

management:
  endpoints:
    web:
      exposure:
        include: health,info

ai:
  mode: ${AI_MODE:mock}           # mock | spring
  mock:
    enabled: false
  provider: spring
  model: ${OPENROUTER_MODEL:openrouter/free}
  apiKey: ${OPENROUTER_API_KEY:}
  baseUrl: ${OPENROUTER_BASE_URL:https://openrouter.ai/api}
  language: zh
  sampleRate: 16000

ser:
  enabled: ${SER_ENABLED:true}
  base-url: ${SER_BASE_URL:http://127.0.0.1:8001}
  segment-ms: ${SER_SEGMENT_MS:8000}
  overlap-ms: ${SER_OVERLAP_MS:0}
  llm-summary-enabled: ${SER_LLM_SUMMARY_ENABLED:false}
  connect-timeout-ms: ${SER_CONNECT_TIMEOUT_MS:5000}
  read-timeout-ms: ${SER_READ_TIMEOUT_MS:180000}
  health-timeout-ms: ${SER_HEALTH_TIMEOUT_MS:1500}

analysis:
  worker:
    enabled: ${ANALYSIS_WORKER_ENABLED:true}
    poll-interval-ms: ${ANALYSIS_WORKER_POLL_INTERVAL_MS:1000}
    batch-size: ${ANALYSIS_WORKER_BATCH_SIZE:20}
    max-attempts: ${ANALYSIS_TASK_MAX_ATTEMPTS:4}
    ser-timeout-ms: ${ANALYSIS_WORKER_SER_TIMEOUT_MS:180000}
    asr-timeout-ms: ${ANALYSIS_WORKER_ASR_TIMEOUT_MS:180000}
    text-sentiment-timeout-ms: ${ANALYSIS_WORKER_TEXT_SENTIMENT_TIMEOUT_MS:20000}
    backoff-base-seconds: ${ANALYSIS_WORKER_BACKOFF_BASE_SECONDS:30}
    backoff-max-seconds: ${ANALYSIS_WORKER_BACKOFF_MAX_SECONDS:600}
  narrative:
    enabled: ${ANALYSIS_NARRATIVE_ENABLED:true}
    provider: ${ANALYSIS_NARRATIVE_PROVIDER:ollama}
    language: ${ANALYSIS_NARRATIVE_LANGUAGE:zh-CN}
    max-transcript-chars: ${ANALYSIS_NARRATIVE_MAX_TRANSCRIPT_CHARS:600}
    max-segments: ${ANALYSIS_NARRATIVE_MAX_SEGMENTS:3}
    trend:
      enabled: ${ANALYSIS_NARRATIVE_TREND_ENABLED:true}
      max-points: ${ANALYSIS_NARRATIVE_TREND_MAX_POINTS:12}
    safety-notice: ${ANALYSIS_NARRATIVE_SAFETY_NOTICE:以上内容仅作辅助参考，不构成医疗诊断。若持续感到痛苦或风险升高，请尽快联系值得信任的人或专业支持资源。}
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://127.0.0.1:11434}
      model: ${OLLAMA_MODEL:gemma4:e4b}
      connect-timeout-ms: ${OLLAMA_CONNECT_TIMEOUT_MS:3000}
      read-timeout-ms: ${OLLAMA_READ_TIMEOUT_MS:180000}
      temperature: ${OLLAMA_TEMPERATURE:0.35}
      preload: ${OLLAMA_PRELOAD:true}
      keep-alive: ${OLLAMA_KEEP_ALIVE:30m}
  text-scoring:
    enabled: ${ANALYSIS_TEXT_SCORING_ENABLED:true}
    provider: ${ANALYSIS_TEXT_SCORING_PROVIDER:ollama}
    language: ${ANALYSIS_TEXT_SCORING_LANGUAGE:zh}
    max-transcript-chars: ${ANALYSIS_TEXT_SCORING_MAX_TRANSCRIPT_CHARS:240}
    fallback-to-ser: ${ANALYSIS_TEXT_SCORING_FALLBACK_TO_SER:true}
    temperature: ${ANALYSIS_TEXT_SCORING_TEMPERATURE:0.10}
  realtime:
    push-interval-ms: ${ANALYSIS_REALTIME_PUSH_INTERVAL_MS:1000}
  consistency:
    enabled: ${ANALYSIS_CONSISTENCY_ENABLED:true}
    audit-log-enabled: ${ANALYSIS_CONSISTENCY_AUDIT_LOG_ENABLED:true}
    sad-positive-conflict:
      enabled: ${ANALYSIS_CONSISTENCY_SAD_POSITIVE_CONFLICT_ENABLED:true}
      voice-confidence-min: ${ANALYSIS_CONSISTENCY_VOICE_CONFIDENCE_MIN:0.98}
      fused-text-neg-max: ${ANALYSIS_CONSISTENCY_FUSED_TEXT_NEG_MAX:0.45}
      transcript-excerpt-max-chars: ${ANALYSIS_CONSISTENCY_TRANSCRIPT_EXCERPT_MAX_CHARS:120}
      transcript-left-context-chars: ${ANALYSIS_CONSISTENCY_TRANSCRIPT_LEFT_CONTEXT_CHARS:24}
      transcript-right-context-chars: ${ANALYSIS_CONSISTENCY_TRANSCRIPT_RIGHT_CONTEXT_CHARS:72}
      positive-lexicon-resource: ${ANALYSIS_CONSISTENCY_POSITIVE_LEXICON_RESOURCE:lexicon/consistency_positive_zh.txt}
      negative-lexicon-resource: ${ANALYSIS_CONSISTENCY_NEGATIVE_LEXICON_RESOURCE:lexicon/consistency_negative_zh.txt}

governance:
  drift:
    monitor-enabled: ${GOVERNANCE_DRIFT_MONITOR_ENABLED:true}
    scan-interval-ms: ${GOVERNANCE_DRIFT_SCAN_INTERVAL_MS:900000}
    window-days: ${GOVERNANCE_DRIFT_WINDOW_DAYS:7}
    baseline-days: ${GOVERNANCE_DRIFT_BASELINE_DAYS:7}
    medium-threshold: ${GOVERNANCE_DRIFT_MEDIUM_THRESHOLD:0.15}
    high-threshold: ${GOVERNANCE_DRIFT_HIGH_THRESHOLD:0.25}
    min-samples: ${GOVERNANCE_DRIFT_MIN_SAMPLES:20}


auth:
  access-token-ttl-seconds: ${AUTH_ACCESS_TOKEN_TTL_SECONDS:7200}
  refresh-token-ttl-seconds: ${AUTH_REFRESH_TOKEN_TTL_SECONDS:604800}
  seed-admin:
    username: ${AUTH_SEED_ADMIN_USERNAME:operator}
    password: ${AUTH_SEED_ADMIN_PASSWORD:operator123}
