  <text x="104" y="164" fill="#A6C1E9" font-size="34" font-family="'Microsoft YaHei', sans-serif" letter-spacing="8">SLEEP</text>
  <text x="104" y="306" fill="#F5FBFF" font-size="78" font-family="'Microsoft YaHei', sans-serif" font-weight="700">睡眠节律</text>
  <text x="104" y="394" fill="#D9E8FA" font-size="36" font-family="'Microsoft YaHei', sans-serif">睡前环境、咖啡因和午睡时长，会一起影响恢复感。</text>
  <text x="104" y="458" fill="#B8CDE6" font-size="28" font-family="'Microsoft YaHei', sans-serif">先修复可控的习惯，再谈“为什么总是睡不好”。</text>
